model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  trust_remote_code: true

lora:
  rank: 8
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]

data:
  max_length: 512
  val_fraction: 0.05
  val_seed: 42

training:
  output_dir: "outputs/subpop-qwen2.5-7b"
  num_epochs: 3
  batch_size: 2                   # per device; 2 GPUs → effective 4 per step
  eval_batch_size: 4
  gradient_accumulation_steps: 8  # effective batch size = 32
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.0
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  report_to: "wandb"
  wandb_project: "subpop-finetune"

inference:
  # used by predictor.py — no generation needed, just one forward pass
  device: "cuda"
